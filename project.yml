# xcodegen spec — `xcodegen generate` produces Warboard.xcodeproj.
# Replaces the prior xtool/SwiftPM build because Live Activities
# require a Widget Extension target, which xtool doesn't support.
name: Warboard
options:
  bundleIdPrefix: com.tornwar
  deploymentTarget:
    iOS: "18.0"
    watchOS: "10.0"

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.0"

settings:
  base:
    MARKETING_VERSION: "0.5.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "DAD59U75G9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"
    TARGETED_DEVICE_FAMILY: "1"     # iPhone only — iPad would force all 4 orientations

targets:
  Warboard:
    type: application
    platform: iOS
    sources:
      - path: WarboardIOS/Sources/WarboardIOS
      - path: WarboardIOS/Sources/Shared
      # Asset catalog goes in `sources` (not `resources`) so xcodegen
      # adds it to the Compile Sources build phase, which actool then
      # picks up. Listing it under resources would copy the raw
      # .xcassets directory into the bundle without compiling — and
      # iOS only loads icons from a compiled Assets.car.
      - path: WarboardIOS/AppIcon/Assets.xcassets
    dependencies:
      - target: ChainWidget
      - target: WarboardWatch
        # watchOS apps must be embedded into the iOS app's bundle at
        # /Watch/<watchapp>.app, not just listed as a build-order dep.
        # Without embed:true the archive contains a free-floating watch
        # app that Xcode can't classify, causing IDEDistributionMethod
        # Manager to report "Unknown Distribution Error" with an empty
        # valid-methods enum → exportArchive fails for any `method`.
        embed: true
        codeSign: true
      - package: SocketIO
        product: SocketIO
    settings:
      base:
        PROVISIONING_PROFILE_SPECIFIER: "Warboard App Store"
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard
        DEVELOPMENT_TEAM: "DAD59U75G9"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        # APNs Live Activity push entitlement. The matching aps-environment
        # capability is enabled on the com.tornwar.warboard App ID and
        # baked into the "Warboard App Store" provisioning profile (UUID
        # 7a52a18f-821c-4f8f-b027-40df4fe5dc55, regenerated 2026-05-09)
        # which the CI workflow installs from the
        # IOS_PROVISIONING_PROFILE_BASE64 secret. Without this entitlement
        # file the activity request falls back to pushType: nil (handled
        # by the controller's catch block); with it, the activity gets a
        # real push token that the warboard server uses to fan out chain
        # updates to backgrounded devices.
        CODE_SIGN_ENTITLEMENTS: WarboardIOS/Resources/Warboard.entitlements
    info:
      path: WarboardIOS/Resources/Info.plist
      properties:
        CFBundleName: Warboard
        CFBundleDisplayName: Warboard
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: com.tornwar.warboard
        UILaunchScreen: {}
        # All four orientations declared so iPad multitasking is
        # supported (Apple validates this regardless of
        # TARGETED_DEVICE_FAMILY). The actual app is portrait-first;
        # rotating doesn't break anything but also isn't optimized.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Required for Live Activities (Dynamic Island).
        NSSupportsLiveActivities: true
        # We answer App Store Connect's encryption-export question
        # up front — only HTTPS, no novel crypto → no compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        # Push Notifications capability — APNs for chain / vault alerts.
        UIBackgroundModes:
          - remote-notification

  ChainWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WarboardIOS/Sources/ChainWidget
      - path: WarboardIOS/Sources/Shared
    info:
      path: WarboardIOS/Sources/ChainWidget/Info.plist
      properties:
        CFBundleName: ChainWidget
        CFBundleDisplayName: Warboard Chain
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: com.tornwar.warboard.ChainWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SKIP_INSTALL: NO
        PROVISIONING_PROFILE_SPECIFIER: "Warboard ChainWidget App Store"
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.ChainWidget
        DEVELOPMENT_TEAM: "DAD59U75G9"
        CODE_SIGN_ENTITLEMENTS: WarboardIOS/Resources/ChainWidget.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"

  WarboardWatch:
    type: application
    platform: watchOS
    sources:
      - path: WarboardIOS/Sources/WarboardWatch
      - path: WarboardIOS/Sources/Shared
        excludes:
          # ActivityKit is iOS-only; pulling these into the watch
          # compile fails with "Unable to find module dependency:
          # 'ActivityKit'". WatchBarsPayload is the only Shared
          # file the watch actually needs.
          - "ChainActivityAttributes.swift"
          - "StatusActivityAttributes.swift"
          - "BarsCache.swift"
    dependencies:
      - target: WarboardWatchComplication
    info:
      path: WarboardIOS/Sources/WarboardWatch/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTS_MACCATALYST: NO
        # Manual signing parity with the iOS targets. The profile +
        # App ID must be registered in the Apple Developer portal
        # before CI can install it from IOS_WATCH_PROVISIONING_PROFILE_BASE64.
        PROVISIONING_PROFILE_SPECIFIER: "Warboard Watch App Store"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "DAD59U75G9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: NO

  WarboardWatchComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: WarboardIOS/Sources/WarboardWatchComplication
      - path: WarboardIOS/Sources/Shared
        excludes:
          - "ChainActivityAttributes.swift"
          - "StatusActivityAttributes.swift"
          - "BarsCache.swift"
    info:
      path: WarboardIOS/Sources/WarboardWatchComplication/Info.plist
    settings:
      base:
        SKIP_INSTALL: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.watchkitapp.WarboardWatchComplication
        TARGETED_DEVICE_FAMILY: "4"
        PROVISIONING_PROFILE_SPECIFIER: "Warboard Watch Complication App Store"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "DAD59U75G9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
