# xcodegen spec — `xcodegen generate` produces Warboard.xcodeproj.
# Replaces the prior xtool/SwiftPM build because Live Activities
# require a Widget Extension target, which xtool doesn't support.
name: Warboard
options:
  bundleIdPrefix: com.tornwar
  deploymentTarget:
    iOS: "18.0"
    watchOS: "10.0"

packages:
  # Forked from socketio/socket.io-client-swift into russianrob's
  # account so Xcode Cloud's GitHub App can be installed on it (Apple's
  # SPM resolver requires repo-level grant for each dep, and you can't
  # grant on third-party repos). The fork's Package.swift was also
  # edited to point Starscream → russianrob/Starscream for the same
  # reason. To upgrade SocketIO: pull upstream into the fork, re-apply
  # the Starscream URL patch, push.
  SocketIO:
    url: https://github.com/russianrob/socket.io-client-swift
    # Tracking the fork's master branch instead of a version tag
    # because the Starscream URL patch lives on master but isn't in
    # any tagged release. We control the fork — HEAD is safe.
    branch: master

settings:
  base:
    MARKETING_VERSION: "0.9.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "DAD59U75G9"
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"
    TARGETED_DEVICE_FAMILY: "1"     # iPhone only — iPad would force all 4 orientations

targets:
  Warboard:
    type: application
    platform: iOS
    sources:
      - path: WarboardIOS/Sources/WarboardIOS
        excludes:
          - "Userscripts"
      - path: WarboardIOS/Sources/Shared
      # Asset catalog goes in `sources` (not `resources`) so xcodegen
      # adds it to the Compile Sources build phase, which actool then
      # picks up. Listing it under resources would copy the raw
      # .xcassets directory into the bundle without compiling — and
      # iOS only loads icons from a compiled Assets.car.
      - path: WarboardIOS/AppIcon/Assets.xcassets
    dependencies:
      - target: WarboardIOS
      - target: ChainWidget
      # 2026-05-20: re-enabling watch with researched fixes —
      #   1. SKIP_INSTALL: NO on iOS app target (settings below) so
      #      Xcode writes ApplicationProperties into the xcarchive
      #      Info.plist (canonical fix per Apple Forums 764375).
      #   2. PlistBuddy post-archive injection in CI (workflow step)
      #      as a belt-and-suspenders fallback.
      - target: WarboardWatch
        embed: true
        codeSign: true
      - package: SocketIO
        product: SocketIO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard
        DEVELOPMENT_TEAM: "DAD59U75G9"
        # SKIP_INSTALL: NO is the canonical fix for "Generic Xcode
        # Archive" misclassification when an iOS app embeds a
        # watchOS app. Without it, xcodebuild produces an xcarchive
        # whose Info.plist is missing the ApplicationProperties
        # dict, and exportArchive rejects every distribution
        # method ("expected one of {}"). See Apple Forums 764375.
        SKIP_INSTALL: NO
        # Signing inherited from base (Automatic) — Xcode Cloud
        # manages the cert + profile itself.
        # APNs Live Activity push entitlement. The matching aps-environment
        # capability is enabled on the com.tornwar.warboard App ID and
        # baked into the "Warboard App Store" provisioning profile (UUID
        # 7a52a18f-821c-4f8f-b027-40df4fe5dc55, regenerated 2026-05-09)
        # which the CI workflow installs from the
        # IOS_PROVISIONING_PROFILE_BASE64 secret. Without this entitlement
        # file the activity request falls back to pushType: nil (handled
        # by the controller's catch block); with it, the activity gets a
        # real push token that the warboard server uses to fan out chain
        # updates to backgrounded devices.
        CODE_SIGN_ENTITLEMENTS: WarboardIOS/Resources/Warboard.entitlements
    info:
      path: WarboardIOS/Resources/Info.plist
      properties:
        CFBundleName: Warboard
        CFBundleDisplayName: Warboard
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: com.tornwar.warboard
        UILaunchScreen: {}
        # All four orientations declared so iPad multitasking is
        # supported (Apple validates this regardless of
        # TARGETED_DEVICE_FAMILY). The actual app is portrait-first;
        # rotating doesn't break anything but also isn't optimized.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Required for Live Activities (Dynamic Island).
        NSSupportsLiveActivities: true
        # We answer App Store Connect's encryption-export question
        # up front — only HTTPS, no novel crypto → no compliance prompt.
        ITSAppUsesNonExemptEncryption: false
        # Push Notifications capability — APNs for chain / vault alerts.
        UIBackgroundModes:
          - remote-notification

  ChainWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WarboardIOS/Sources/ChainWidget
      - path: WarboardIOS/Sources/Shared
    info:
      path: WarboardIOS/Sources/ChainWidget/Info.plist
      properties:
        CFBundleName: ChainWidget
        CFBundleDisplayName: Warboard Chain
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: com.tornwar.warboard.ChainWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SKIP_INSTALL: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.ChainWidget
        DEVELOPMENT_TEAM: "DAD59U75G9"
        CODE_SIGN_ENTITLEMENTS: WarboardIOS/Resources/ChainWidget.entitlements

  WarboardWatch:
    type: application
    platform: watchOS
    sources:
      - path: WarboardIOS/Sources/WarboardWatch
      - path: WarboardIOS/Sources/Shared
        excludes:
          # ActivityKit is iOS-only; pulling these into the watch
          # compile fails with "Unable to find module dependency:
          # 'ActivityKit'". WatchBarsPayload is the only Shared
          # file the watch actually needs.
          - "ChainActivityAttributes.swift"
          - "StatusActivityAttributes.swift"
          - "BarsCache.swift"
      # Watch asset catalog — single 1024x1024 master mapped to all
      # watchOS size slots via Contents.json. Required for ASC upload
      # validation (Apple expects CFBundleIconFiles populated from a
      # compiled Assets.car).
      - path: WarboardIOS/WatchAppIcon/Assets.xcassets
    dependencies:
      - target: WarboardWatchComplication
    info:
      path: WarboardIOS/Sources/WarboardWatch/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_TEAM: "DAD59U75G9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SKIP_INSTALL: NO
        # Force Xcode to use our literal Info.plist (don't generate
        # or merge). The plain plist already contains WKApplication.
        # When GENERATE_INFOPLIST_FILE defaults to YES, Xcode silently
        # synthesizes a fresh plist that drops our WK* keys.
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WarboardIOS/Sources/WarboardWatch/Info.plist
        # Watch app icon name — references AppIcon image set inside
        # WarboardIOS/WatchAppIcon/Assets.xcassets. ASC validation
        # demands this Info.plist key match the compiled icon name.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Group for sharing UserDefaults between WarboardWatch
        # and WarboardWatchComplication (separate watchOS processes
        # like iOS widget extensions; same App Group requirement).
        CODE_SIGN_ENTITLEMENTS: WarboardIOS/Resources/WarboardWatch.entitlements

  WarboardWatchComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: WarboardIOS/Sources/WarboardWatchComplication
      - path: WarboardIOS/Sources/Shared
        excludes:
          - "ChainActivityAttributes.swift"
          - "StatusActivityAttributes.swift"
          - "BarsCache.swift"
    info:
      path: WarboardIOS/Sources/WarboardWatchComplication/Info.plist
    settings:
      base:
        SKIP_INSTALL: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.watchkitapp.WarboardWatchComplication
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_TEAM: "DAD59U75G9"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        CODE_SIGN_ENTITLEMENTS: WarboardIOS/Resources/WarboardWatchComplication.entitlements

  # Userscript engine as its own framework so the SAME `@testable import
  # WarboardIOS` resolves on Mac (framework module) as on Linux (SwiftPM
  # lib). Sources = Userscripts/ only; WebKit/SwiftUI engine files added
  # in the Mac phase compile here (frameworks can import WebKit). The
  # SwiftPM Package.swift mirrors this target for headless Linux tests.
  WarboardIOS:
    type: framework
    platform: iOS
    sources:
      # gm-bootstrap.js is embedded as a base64 Swift constant
      # (GMBootstrapJS.swift) — no resource bundling needed.
      - path: WarboardIOS/Sources/WarboardIOS/Userscripts
        excludes:
          - "Resources/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.engine
        PRODUCT_MODULE_NAME: WarboardIOS
        DEVELOPMENT_TEAM: "DAD59U75G9"
        GENERATE_INFOPLIST_FILE: "YES"

  # Unit-test bundle for the engine. Logic tests (no host app) so the
  # test build pulls in only the framework — no app/watch/signing.
  WarboardIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WarboardIOS/Tests/WarboardIOSTests
    dependencies:
      - target: WarboardIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tornwar.warboard.tests
        DEVELOPMENT_TEAM: "DAD59U75G9"
        GENERATE_INFOPLIST_FILE: "YES"

# Explicit scheme so the Warboard main scheme is always created and
# marked Shared after `xcodegen generate`. Without this block, xcodegen
# auto-generated schemes for the extension/watch targets but skipped
# Warboard itself (cause unclear — possibly the embed:false +
# postBuildScript history), and Xcode Cloud could only see schemes
# tied to extensions, not the actual app. Manually-added schemes in
# Manage Schemes get wiped on every regenerate, so this lives in the
# spec instead.
schemes:
  Warboard:
    build:
      targets:
        Warboard: all
        ChainWidget: all
        WarboardWatch: all
        WarboardWatchComplication: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
    test:
      config: Debug
  WarboardIOSTests:
    build:
      targets:
        WarboardIOSTests: [test]
    test:
      config: Debug
      targets:
        - WarboardIOSTests
