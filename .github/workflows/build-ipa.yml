name: Build IPA

# Triggers:
#   - workflow_dispatch  — manual builds (no TestFlight upload)
#   - tag push v*.*.*    — full pipeline: signed archive → TestFlight
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write   # for tag-triggered release attachment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick newest installed Xcode
        # Apple requires the iOS 26 SDK starting Apr 28 2026, so use
        # the newest Xcode the runner has rather than the macos-latest
        # default.
        run: |
          NEWEST="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version
          xcrun --show-sdk-version --sdk iphoneos

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve marketing version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date +%Y%m%d-%H%M%S)-dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect signing secrets
        id: sign_check
        env:
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          if [[ -n "$CERT" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::IOS_DIST_CERT_P12_BASE64 not set — building unsigned (no TestFlight upload)."
          fi

      - name: Import distribution cert + provisioning profiles
        # Imports the .p12 into a throwaway keychain and drops both
        # provisioning profiles (main app + widget extension) into the
        # system profile cache so xcodebuild can find them by UUID.
        if: steps.sign_check.outputs.available == 'true'
        env:
          IOS_DIST_CERT_P12_BASE64:        ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD:      ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64:        ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/ios_dist.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$IOS_DIST_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          EXISTING="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          MAIN_PATH="$RUNNER_TEMP/main.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$MAIN_PATH"
          MAIN_UUID="$(security cms -D -i "$MAIN_PATH" | plutil -extract UUID raw -)"
          cp "$MAIN_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${MAIN_UUID}.mobileprovision"
          echo "Main app profile UUID: $MAIN_UUID"

          if [[ -n "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" ]]; then
            WIDGET_PATH="$RUNNER_TEMP/widget.mobileprovision"
            echo "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$WIDGET_PATH"
            WIDGET_UUID="$(security cms -D -i "$WIDGET_PATH" | plutil -extract UUID raw -)"
            cp "$WIDGET_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${WIDGET_UUID}.mobileprovision"
            echo "Widget profile UUID: $WIDGET_UUID"
          else
            echo "::error::IOS_WIDGET_PROVISIONING_PROFILE_BASE64 not set — needed for the ChainWidget extension. Register a new App Store profile for com.tornwar.warboard.ChainWidget at developer.apple.com and upload it."
            exit 1
          fi

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Archive (Release, signed)
        # DEVELOPMENT_TEAM, CODE_SIGN_IDENTITY, CODE_SIGN_STYLE,
        # PROVISIONING_PROFILE_SPECIFIER are baked into project.yml
        # per-target (team is the same for all our apps; identity is
        # the only Apple Distribution cert we have). No command-line
        # overrides needed — passing `DEVELOPMENT_TEAM=""` (when the
        # secret was unset) silently defeated the project.yml value
        # because xcodebuild treats command-line overrides as final.
        if: steps.sign_check.outputs.available == 'true'
        run: |
          xcodebuild archive \
            -project Warboard.xcodeproj \
            -scheme Warboard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Warboard.xcarchive" \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Export IPA
        if: steps.sign_check.outputs.available == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Warboard.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist
          IPA_PATH="$(find "$RUNNER_TEMP/export" -type f -name '*.ipa' -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA produced"; ls -la "$RUNNER_TEMP/export"; exit 1
          fi
          SIGNED_IPA="$RUNNER_TEMP/Warboard-${{ steps.version.outputs.VERSION }}.ipa"
          mv "$IPA_PATH" "$SIGNED_IPA"
          echo "SIGNED_IPA=$SIGNED_IPA" >> "$GITHUB_ENV"
          ls -la "$SIGNED_IPA"

      - name: Upload to TestFlight
        if: steps.sign_check.outputs.available == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_API_KEY_BASE64" | base64 --decode -o "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          set +e
          xcrun altool --upload-app \
            --type ios \
            --file "$SIGNED_IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee altool.log
          STATUS=${PIPESTATUS[0]}
          if [[ $STATUS -ne 0 ]] || grep -qE "UPLOAD FAILED|Validation failed|ERROR ITMS-" altool.log; then
            echo "altool reported failure (exit=$STATUS)."
            exit 1
          fi
          echo "TestFlight upload succeeded."

      - name: Upload IPA artifact
        if: steps.sign_check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Warboard-${{ steps.version.outputs.VERSION }}-ipa
          path: ${{ env.SIGNED_IPA }}
          retention-days: 90

      - name: Attach IPA to GitHub Release
        if: steps.sign_check.outputs.available == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SIGNED_IPA }}
          generate_release_notes: true

      - name: Clean up signing keychain
        if: always() && steps.sign_check.outputs.available == 'true'
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
