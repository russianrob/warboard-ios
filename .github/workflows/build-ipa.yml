name: Build IPA

# Triggers:
#   - workflow_dispatch  — manual builds (no TestFlight upload)
#   - tag push v*.*.*    — full pipeline: signed archive → TestFlight
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
    # Also build on every push to main while we're testing fastlane.
    # Remove this branches block once watch ships and we're stable.
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write   # for tag-triggered release attachment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick newest installed Xcode
        # Apple requires the iOS 26 SDK starting Apr 28 2026, so use
        # the newest Xcode the runner has rather than the macos-latest
        # default.
        run: |
          NEWEST="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version
          xcrun --show-sdk-version --sdk iphoneos

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Patch project.yml to Manual signing (GH Actions only)
        # Repo default is Automatic (so Xcode Cloud works). GH Actions
        # uses pre-installed Manual profiles → patch back to Manual +
        # re-add the per-target PROVISIONING_PROFILE_SPECIFIER lines
        # that were stripped when we moved to Automatic globally.
        run: |
          sed -i.bak 's/CODE_SIGN_STYLE: Automatic/CODE_SIGN_STYLE: Manual/' project.yml
          rm -f project.yml.bak
          python3 <<'PY'
          mapping = {
              'com.tornwar.warboard': 'Warboard App Store',
              'com.tornwar.warboard.ChainWidget': 'Warboard ChainWidget App Store',
              'com.tornwar.warboard.watchkitapp': 'Warboard Watch App Store',
              'com.tornwar.warboard.watchkitapp.WarboardWatchComplication': 'Warboard Watch Complication App Store',
          }
          with open('project.yml') as f:
              src = f.read()
          for bundle, profile in mapping.items():
              needle = f'PRODUCT_BUNDLE_IDENTIFIER: {bundle}\n'
              if needle not in src: continue
              addition = f'        PROVISIONING_PROFILE_SPECIFIER: "{profile}"\n        CODE_SIGN_IDENTITY: "Apple Distribution"\n'
              if 'PROVISIONING_PROFILE_SPECIFIER' in src.split(needle, 1)[1].split('\n', 4)[1]:
                  continue
              src = src.replace(needle, needle + addition, 1)
          with open('project.yml', 'w') as f:
              f.write(src)
          print("project.yml patched for Manual signing")
          PY

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Resolve marketing version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Apple requires X.Y.Z format. Derive from project.yml's
            # MAJOR.MINOR + run_number as patch. e.g. 0.6.123
            MAJOR_MINOR=$(grep -E '^\s+MARKETING_VERSION:' project.yml | sed -E 's/.*"([0-9]+\.[0-9]+).*/\1/' | head -1)
            VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=$VERSION"

      - name: Detect signing secrets
        id: sign_check
        env:
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          if [[ -n "$CERT" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::IOS_DIST_CERT_P12_BASE64 not set — building unsigned (no TestFlight upload)."
          fi

      - name: Import distribution cert + provisioning profiles
        # Imports the .p12 into a throwaway keychain and drops both
        # provisioning profiles (main app + widget extension) into the
        # system profile cache so xcodebuild can find them by UUID.
        if: steps.sign_check.outputs.available == 'true'
        env:
          IOS_DIST_CERT_P12_BASE64:        ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD:      ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64:                    ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_WIDGET_PROVISIONING_PROFILE_BASE64:             ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE_BASE64 }}
          IOS_WATCH_PROVISIONING_PROFILE_BASE64:              ${{ secrets.IOS_WATCH_PROVISIONING_PROFILE_BASE64 }}
          IOS_WATCH_COMPLICATION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WATCH_COMPLICATION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/ios_dist.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$IOS_DIST_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          EXISTING="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          MAIN_PATH="$RUNNER_TEMP/main.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$MAIN_PATH"
          MAIN_UUID="$(security cms -D -i "$MAIN_PATH" | plutil -extract UUID raw -)"
          cp "$MAIN_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${MAIN_UUID}.mobileprovision"
          echo "Main app profile UUID: $MAIN_UUID"

          if [[ -n "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" ]]; then
            WIDGET_PATH="$RUNNER_TEMP/widget.mobileprovision"
            echo "$IOS_WIDGET_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$WIDGET_PATH"
            WIDGET_UUID="$(security cms -D -i "$WIDGET_PATH" | plutil -extract UUID raw -)"
            cp "$WIDGET_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${WIDGET_UUID}.mobileprovision"
            echo "Widget profile UUID: $WIDGET_UUID"
          else
            echo "::error::IOS_WIDGET_PROVISIONING_PROFILE_BASE64 not set — needed for the ChainWidget extension. Register a new App Store profile for com.tornwar.warboard.ChainWidget at developer.apple.com and upload it."
            exit 1
          fi

          # Watch app + complication profiles. Same pattern as the
          # widget block above. xcodebuild matches profiles to targets
          # by the PROVISIONING_PROFILE_SPECIFIER baked into project.yml.
          if [[ -n "$IOS_WATCH_PROVISIONING_PROFILE_BASE64" ]]; then
            WATCH_PATH="$RUNNER_TEMP/watch.mobileprovision"
            echo "$IOS_WATCH_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$WATCH_PATH"
            WATCH_UUID="$(security cms -D -i "$WATCH_PATH" | plutil -extract UUID raw -)"
            cp "$WATCH_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${WATCH_UUID}.mobileprovision"
            echo "Watch app profile UUID: $WATCH_UUID"
          else
            echo "::error::IOS_WATCH_PROVISIONING_PROFILE_BASE64 not set — needed for the WarboardWatch watchOS app. Register an App Store profile for com.tornwar.warboard.watchkitapp at developer.apple.com and upload it."
            exit 1
          fi

          if [[ -n "$IOS_WATCH_COMPLICATION_PROVISIONING_PROFILE_BASE64" ]]; then
            COMP_PATH="$RUNNER_TEMP/watch-complication.mobileprovision"
            echo "$IOS_WATCH_COMPLICATION_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$COMP_PATH"
            COMP_UUID="$(security cms -D -i "$COMP_PATH" | plutil -extract UUID raw -)"
            cp "$COMP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${COMP_UUID}.mobileprovision"
            echo "Watch complication profile UUID: $COMP_UUID"
          else
            echo "::error::IOS_WATCH_COMPLICATION_PROVISIONING_PROFILE_BASE64 not set — needed for the WarboardWatchComplication widget extension. Register an App Store profile for com.tornwar.warboard.watchkitapp.WarboardWatchComplication at developer.apple.com and upload it."
            exit 1
          fi

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Archive (Release, signed)
        if: steps.sign_check.outputs.available == 'true'
        run: |
          xcodebuild archive \
            -project Warboard.xcodeproj \
            -scheme Warboard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Warboard.xcarchive" \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Inject ApplicationProperties into xcarchive
        # The xcodegen+xcodebuild archive flow for paired iOS+Watch
        # apps produces an xcarchive whose Info.plist is missing the
        # ApplicationProperties dict — without it, exportArchive
        # classifies the archive as "Generic" and rejects every
        # distribution method. We synthesize the dict here using
        # PlistBuddy. This is workaround #3 from the research; works
        # even if SKIP_INSTALL fix alone (in project.yml) doesn't.
        # https://developer.apple.com/forums/thread/764375
        if: steps.sign_check.outputs.available == 'true'
        run: |
          set -e
          ARCH="$RUNNER_TEMP/Warboard.xcarchive"
          INFO="$ARCH/Info.plist"
          IOS_APP="$ARCH/Products/Applications/Warboard.app"
          IOS_INFO="$IOS_APP/Info.plist"
          if [[ ! -f "$IOS_INFO" ]]; then
            echo "::warning::Can't find Warboard.app Info.plist — skipping injection"
            ls -la "$ARCH/Products/Applications" 2>/dev/null || true
            exit 0
          fi
          IOS_BUNDLE_ID=$(plutil -extract CFBundleIdentifier raw "$IOS_INFO")
          IOS_SHORT_VER=$(plutil -extract CFBundleShortVersionString raw "$IOS_INFO")
          IOS_BUILD_VER=$(plutil -extract CFBundleVersion raw "$IOS_INFO")
          echo "Injecting ApplicationProperties: bundle=$IOS_BUNDLE_ID short=$IOS_SHORT_VER build=$IOS_BUILD_VER"
          # Remove any existing block, then add a fresh one.
          /usr/libexec/PlistBuddy -c "Delete :ApplicationProperties" "$INFO" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties dict" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:ApplicationPath string Applications/Warboard.app" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:CFBundleIdentifier string $IOS_BUNDLE_ID" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:CFBundleShortVersionString string $IOS_SHORT_VER" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:CFBundleVersion string $IOS_BUILD_VER" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:SigningIdentity string 'Apple Distribution: Robert Hay (DAD59U75G9)'" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:Team string DAD59U75G9" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:Architectures array" "$INFO"
          /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:Architectures:0 string arm64" "$INFO"
          echo "Final xcarchive Info.plist:"
          plutil -p "$INFO"

      - name: Splice Watch into archive
        if: steps.sign_check.outputs.available == 'true'
        run: |
          set -e
          ARCH="$RUNNER_TEMP/Warboard.xcarchive"
          APPS="$ARCH/Products/Applications"
          IOS_APP="$APPS/Warboard.app"
          WATCH_APP="$APPS/WarboardWatch.app"
          if [[ ! -d "$WATCH_APP" ]]; then
            echo "WarboardWatch.app not at archive top level — already embedded or missing"
            ls -la "$APPS"
            ls -la "$IOS_APP/Watch" 2>/dev/null && echo "(already embedded)" || true
            exit 0
          fi
          mkdir -p "$IOS_APP/Watch"
          mv "$WATCH_APP" "$IOS_APP/Watch/WarboardWatch.app"
          codesign --force --sign "Apple Distribution: Robert Hay (DAD59U75G9)" \
                   --deep --timestamp \
                   "$IOS_APP"
          echo "Spliced + re-signed"

      - name: Export IPA
        if: steps.sign_check.outputs.available == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Warboard.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist
          IPA_PATH="$(find "$RUNNER_TEMP/export" -type f -name '*.ipa' -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA produced"; ls -la "$RUNNER_TEMP/export"; exit 1
          fi
          SIGNED_IPA="$RUNNER_TEMP/Warboard-${{ steps.version.outputs.VERSION }}.ipa"
          mv "$IPA_PATH" "$SIGNED_IPA"
          echo "SIGNED_IPA=$SIGNED_IPA" >> "$GITHUB_ENV"
          ls -la "$SIGNED_IPA"

      - name: Upload to TestFlight
        if: steps.sign_check.outputs.available == 'true' && env.SIGNED_IPA != ''
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_API_KEY_BASE64" | base64 --decode -o "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          # Note: --upload-app + --type ios + --apiKey is the
          # documented form; the "cannot determine platform" error
          # before fix was because the archive lacked the embedded
          # Watch metadata that hints at platform. Now that the watch
          # app is properly embedded (Warboard.app/Watch/...) the
          # platform should be auto-detected.
          # Xcode 26.x altool requires explicit --bundle-id when the
          # IPA has both iOS and watchOS payloads (it can't decide
          # which platform to upload as). Pinning to the iOS bundle
          # ID makes it treat the package as an iOS app with embedded
          # watch.
          # App Store Connect numeric Apple ID for com.tornwar.warboard.
          # Not sensitive — visible to anyone who looks at the app's
          # public listing. Hardcoded so future builds don't need a
          # secret round-trip.
          xcrun altool --upload-app \
            --type ios \
            --apple-id "6764058849" \
            --bundle-id "com.tornwar.warboard" \
            --bundle-short-version-string "${{ steps.version.outputs.VERSION }}" \
            --bundle-version "${{ github.run_number }}" \
            --file "$SIGNED_IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee altool.log
          if grep -qE "UPLOAD FAILED|Validation failed|ERROR ITMS-|ERROR:" altool.log; then
            echo "altool failure" && exit 1
          fi
          echo "TestFlight upload succeeded"

      - name: Dump xcarchive Info.plist (on failure)
        if: failure() && steps.sign_check.outputs.available == 'true'
        run: |
          ARCHIVE_INFO="$RUNNER_TEMP/Warboard.xcarchive/Info.plist"
          if [[ -f "$ARCHIVE_INFO" ]]; then
            echo "=== Warboard.xcarchive/Info.plist (decoded) ==="
            plutil -p "$ARCHIVE_INFO"
            echo ""
            echo "=== Products/Applications layout ==="
            ls -la "$RUNNER_TEMP/Warboard.xcarchive/Products/Applications/" 2>/dev/null || echo "(no Products/Applications)"
            # If the iOS app exists, check whether it embeds the watch app
            IOS_APP="$(find "$RUNNER_TEMP/Warboard.xcarchive/Products/Applications" -maxdepth 2 -name '*.app' -type d | head -1)"
            if [[ -n "$IOS_APP" ]]; then
              echo ""
              echo "=== $(basename "$IOS_APP") top-level ==="
              ls -la "$IOS_APP" | head -20
              echo ""
              echo "=== $(basename "$IOS_APP")/Watch/ ==="
              ls -la "$IOS_APP/Watch" 2>/dev/null || echo "(no Watch/ subdir — watch app NOT embedded)"
            fi
          else
            echo "No xcarchive at expected path"
            find "$RUNNER_TEMP" -name "Info.plist" -path "*xcarchive*" | head -3
          fi

      - name: Capture Xcode distribution logs (on failure)
        # IDEDistributionMethodManagerErrorDomain Code=2 is opaque from
        # the top-level error. The actual reason lives in the
        # xcdistributionlogs bundle Xcode writes to /var/folders during
        # exportArchive. Grab it as an artifact so we can read it.
        if: failure() && steps.sign_check.outputs.available == 'true'
        run: |
          LOG_DIR="$(find /var/folders -type d -name '*.xcdistributionlogs' 2>/dev/null | head -1)"
          if [[ -n "$LOG_DIR" ]]; then
            echo "Found distribution log dir: $LOG_DIR"
            cp -R "$LOG_DIR" "$RUNNER_TEMP/xcdistributionlogs"
            ls -la "$RUNNER_TEMP/xcdistributionlogs"
            echo "=== IDEDistribution.standard.log ==="
            cat "$RUNNER_TEMP/xcdistributionlogs"/IDEDistribution.standard.log 2>/dev/null || echo "(missing)"
            echo ""
            echo "=== IDEDistribution.critical.log ==="
            cat "$RUNNER_TEMP/xcdistributionlogs"/IDEDistribution.critical.log 2>/dev/null || echo "(missing)"
          else
            echo "No xcdistributionlogs directory found under /var/folders"
            find /var/folders -name "*distribution*" 2>/dev/null | head -5
          fi

      - name: Upload xcdistributionlogs artifact
        if: failure() && steps.sign_check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: xcdistributionlogs-${{ steps.version.outputs.VERSION }}
          path: ${{ runner.temp }}/xcdistributionlogs
          if-no-files-found: ignore

      - name: Upload IPA artifact
        if: steps.sign_check.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Warboard-fastlane-${{ github.run_number }}-ipa
          path: build/Warboard.ipa
          if-no-files-found: ignore
          retention-days: 90

      - name: Clean up signing keychain
        if: always() && steps.sign_check.outputs.available == 'true'
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
