name: Build IPA

# Triggers:
#   - workflow_dispatch  — manual builds (no TestFlight upload)
#   - tag push v*.*.*    — full pipeline: re-sign + upload to TestFlight
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write   # for tag-triggered release attachment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xtool
        run: brew install xtool-org/tap/xtool

      - name: Wire xtool to the runner's iOS SDK
        # Reuses the pre-installed Xcode rather than downloading a
        # fresh Xcode.xip — saves ~15 GB and ~10 min per run.
        run: xtool sdk install /Applications/Xcode.app

      - name: Resolve marketing version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date +%Y%m%d-%H%M%S)-dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build unsigned IPA
        working-directory: WarboardIOS
        run: xtool dev build --ipa --configuration release

      - name: Locate built IPA
        id: locate
        working-directory: WarboardIOS
        run: |
          IPA_PATH="$(find xtool .build -type f -name '*.ipa' -print -quit 2>/dev/null)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA produced — listing recent files:"
            find . -maxdepth 4 -type f \( -name '*.ipa' -o -name '*.app' \) 2>/dev/null
            exit 1
          fi
          # Absolute path so re-sign/upload steps don't depend on CWD.
          ABS="$(cd "$(dirname "$IPA_PATH")" && pwd)/$(basename "$IPA_PATH")"
          echo "ABS_IPA=$ABS" >> "$GITHUB_OUTPUT"
          ls -la "$ABS"

      - name: Detect signing secrets
        # Same env-into-output dance as warboard-mac — secrets aren't
        # allowed in `if:` conditions.
        id: sign_check
        env:
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          if [[ -n "$CERT" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::IOS_DIST_CERT_P12_BASE64 not set — skipping resign + TestFlight upload."
          fi

      - name: Import distribution cert + provisioning profile
        if: steps.sign_check.outputs.available == 'true'
        env:
          IOS_DIST_CERT_P12_BASE64:        ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_P12_PASSWORD:      ${{ secrets.IOS_DIST_CERT_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/ios_dist.p12"
          PROFILE_PATH="$RUNNER_TEMP/warboard.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$IOS_DIST_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          EXISTING="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Decode the provisioning profile so the resign step can
          # extract entitlements + UUID.
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          # Also drop a copy in the system profile cache so Xcode tools
          # can find it by UUID.
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Re-sign IPA for App Store distribution
        # xtool produces an unsigned IPA. For TestFlight we re-sign with
        # the Apple Distribution cert + the App Store provisioning
        # profile, embedding the entitlements declared in that profile.
        if: steps.sign_check.outputs.available == 'true'
        env:
          ABS_IPA: ${{ steps.locate.outputs.ABS_IPA }}
        run: |
          IDENTITY="Apple Distribution: Robert Hay (DAD59U75G9)"
          WORK="$RUNNER_TEMP/ipa-resign"
          rm -rf "$WORK" && mkdir -p "$WORK"
          cd "$WORK"

          # Unzip the IPA — Payload/<App>.app.
          unzip -q "$ABS_IPA"
          APP_PATH="$(find Payload -maxdepth 2 -type d -name '*.app' -print -quit)"
          if [[ -z "$APP_PATH" ]]; then
            echo "No .app inside IPA"; ls -la Payload || true; exit 1
          fi
          echo "Re-signing $APP_PATH"

          # Embed the App Store profile.
          cp "$PROFILE_PATH" "$APP_PATH/embedded.mobileprovision"

          # Extract entitlements from the profile and write to a file
          # codesign can consume.
          ENT_PATH="$WORK/entitlements.plist"
          security cms -D -i "$PROFILE_PATH" \
            | plutil -extract Entitlements xml1 -o "$ENT_PATH" -

          # Sign embedded frameworks first, then the app (inside-out).
          if [[ -d "$APP_PATH/Frameworks" ]]; then
            for fw in "$APP_PATH/Frameworks/"*; do
              [[ -e "$fw" ]] || continue
              echo "  Signing framework $fw"
              codesign --force --sign "$IDENTITY" --timestamp \
                --options runtime \
                "$fw"
            done
          fi

          codesign --force --sign "$IDENTITY" --timestamp \
            --options runtime \
            --entitlements "$ENT_PATH" \
            "$APP_PATH"

          # Verify.
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --display --verbose=4 "$APP_PATH" 2>&1 | grep -E '(Authority|TeamIdentifier|application-identifier)'

          # Re-zip into a fresh IPA.
          SIGNED_IPA="$RUNNER_TEMP/Warboard-${{ steps.version.outputs.VERSION }}-signed.ipa"
          rm -f "$SIGNED_IPA"
          (cd "$WORK" && zip -qr "$SIGNED_IPA" Payload)
          ls -la "$SIGNED_IPA"
          echo "SIGNED_IPA=$SIGNED_IPA" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        if: steps.sign_check.outputs.available == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # altool looks for the .p8 at ~/.appstoreconnect/private_keys/
          # or ~/private_keys/. Drop it in both for safety.
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_API_KEY_BASE64" | base64 --decode -o "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          xcrun altool --upload-app \
            --type ios \
            --file "$SIGNED_IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Stage final artifact
        # Pick the signed IPA when present, otherwise the unsigned one
        # so workflow_dispatch runs still produce a downloadable IPA.
        id: stage
        run: |
          if [[ -n "$SIGNED_IPA" && -f "$SIGNED_IPA" ]]; then
            FINAL="$SIGNED_IPA"
          else
            FINAL="${{ steps.locate.outputs.ABS_IPA }}"
            # Rename so the artifact name reads cleanly.
            NAMED="$RUNNER_TEMP/Warboard-${{ steps.version.outputs.VERSION }}-unsigned.ipa"
            cp "$FINAL" "$NAMED"
            FINAL="$NAMED"
          fi
          echo "FINAL_IPA=$FINAL" >> "$GITHUB_OUTPUT"
          ls -la "$FINAL"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Warboard-${{ steps.version.outputs.VERSION }}-ipa
          path: ${{ steps.stage.outputs.FINAL_IPA }}
          retention-days: 90

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.FINAL_IPA }}
          generate_release_notes: true

      - name: Clean up signing keychain
        if: always() && steps.sign_check.outputs.available == 'true'
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
