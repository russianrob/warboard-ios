name: Build IPA

# Triggers:
#   - workflow_dispatch  — manual builds (start here for iteration)
#   - tag push v*.*.*    — also attaches IPA to the GitHub Release
#
# The build is unsigned for now — output is an .ipa you can sideload
# via AltStore / SideStore, which signs at install time using your
# free or paid Apple ID. Apple Developer signing in CI requires a
# Distribution cert + provisioning profile setup we'll bolt on later.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write   # for tag-triggered release attachment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xtool
        # xtool ships a homebrew tap with macOS + Linux binaries; the
        # macOS one is what we need on the CI runner.
        run: brew install xtool-org/tap/xtool

      - name: Wire xtool to the runner's iOS SDK
        # Reuses the pre-installed Xcode rather than downloading a
        # fresh Xcode.xip — saves ~15 GB and ~10 min per run.
        run: xtool sdk install /Applications/Xcode.app

      - name: Resolve marketing version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date +%Y%m%d-%H%M%S)-dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build unsigned IPA
        working-directory: WarboardIOS
        run: |
          xtool dev build --ipa --configuration release
          ls -la .build/

      - name: Locate IPA
        id: locate
        working-directory: WarboardIOS
        run: |
          IPA_PATH="$(find .build -type f -name '*.ipa' -print -quit)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA produced — checking what xtool did:"
            find .build -maxdepth 4 -type f | head -40
            exit 1
          fi
          # Rename to versioned filename for upload + release.
          IPA_NAME="Warboard-${{ steps.version.outputs.VERSION }}.ipa"
          mv "$IPA_PATH" "$IPA_NAME"
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "IPA_PATH=$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Warboard-${{ steps.version.outputs.VERSION }}-ipa
          path: WarboardIOS/${{ steps.locate.outputs.IPA_NAME }}
          retention-days: 90

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: WarboardIOS/${{ steps.locate.outputs.IPA_NAME }}
          generate_release_notes: true
